name: Build Frontend
on:
  push:
    branches: [feature/alerts-export-department]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        working-directory: frontend
        run: |
          npm install
          npm run build
      - name: Upload static artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-build
          path: static/
